name: build

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    # Pin to the VS 2022 image: it ships the v143 toolset and the Windows SDK
    # (10.0.22621.0) that the project targets. windows-latest has moved to a
    # newer VS/SDK that the project is not pinned to.
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    env:
      SOLUTION: IconMaster.sln

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION

      - name: Build
        run: >
          msbuild $env:SOLUTION
          /m
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=${{ matrix.platform }}
          /p:GenerateAppxPackageOnBuild=false
          /p:AppxPackageSigningEnabled=false
          /verbosity:minimal
